<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portifólio Pessoal</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/button.css" />
    <link rel="stylesheet" href="/src/styles/contact.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <!--            
    -->
  </head>
  <body>
    <!-- MENU -->
    <header>
      <nav class="navbar">
        <ul class="navUl">
          <li class="navLi">
            <a href="home.html" class="navLink">Home</a>
          </li>
          <li class="navLi">
            <a href="about.html" class="navLink">Sobre mim!</a>
          </li>
          <li class="navLi">
            <a href="education.html" class="navLink">Formação</a>
          </li>
          <li class="navLi">
            <a href="portfolio.html" class="navLink">Portfólio</a>
          </li>
          <li class="navLi">
            <a href="contact.html" class="navLink active">Contato</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- conteudo principal, caixa de contato e formulário de contato -->
    <main>
      <div class="content">
        <h1 class="title">Entre em contato!</h1>
        <p>
          Estou aberta a novas oportunidades, colaborações e feedbacks. Sinta-se
          à vontade para entrar em contato! Meu email:
          <span class="span"
            ><a href="mailto:vitoriaalves0santos@gmail.com"
              >vitoriaalves0santos@gmail.com</a
            >
          </span>
        </p>
        <div id="socialMedia">
          <button class="contactButton">
            <a href="https://www.instagram.com/viviz.as/" target="_blank"
              ><img src="/src/assets/instagram.png" id="instagramIcon"
            /></a>
          </button>
          <button class="contactButton">
            <a href="https://github.com/vitoriaalves00" target="_blank"
              ><img src="/src/assets/github.png"
            /></a>
          </button>
        </div>
      </div>

      <!-- formulário com campos de nome, email, assunto e mensagem -->

      <form method="post" class="contactForm" id="form">
        <fieldset class="fieldset">
          <div class="inputBox">
            <div class="inputGroup">
              <label for="name">Nome: </label>
              <input id="name" type="text" placeholder="Digite seu nome" />
              <span class="error"></span>
            </div>

            <div class="inputGroup">
              <label for="email">Email: </label>
              <input id="email" type="email" placeholder="Digite seu email" />
              <span class="error"></span>
            </div>
          </div>

          <div class="inputGroup">
            <label for="subject">Assunto: </label>
            <input id="subject" type="text" placeholder="Digite seu assunto" />
            <span class="error"></span>
          </div>

          <div class="inputGroup">
            <label for="message">Mensagem: </label>
            <textarea
              class="message"
              id="message"
              name="message"
              placeholder="Digite sua mensagem..."
            ></textarea>
            <span class="error"></span>
          </div>

          <button type="submit" class="btn" id="button02">Enviar</button>
        </fieldset>
      </form>
    </main>

    <footer class="footer">
      <a href="home.html"><img src="/src/assets/home.png" alt="" /></a>
    </footer>

    <!-- scripts -->
    <script src="/src/javascript/script.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
  </body>
</html>
